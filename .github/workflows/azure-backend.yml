name: Deploy Backend to Azure App Service

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout GitHub Repository
      uses: actions/checkout@v3

    - name: Set up Python Environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Application Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f portal/backend/requirements.txt ]; then pip install -r portal/backend/requirements.txt; fi

    - name: Log in to Azure via CLI (OIDC Federated)
      uses: azure/login@v1
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ae525757-89ba-4d30-a2f7-49796ef8c604
        subscription-id: 2cebf8bf-d6d7-4b72-b8ec-f233f277a66b  # ID estándar de la suscripción Datamining

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'AS-AppBackendEncuestasUR'